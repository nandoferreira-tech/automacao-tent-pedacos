name: CI/CD — Agente WhatsApp

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # 1. Deploy Homologação — roda automaticamente
  # ---------------------------------------------------------------------------
  deploy-homolog:
    name: Deploy → Homologação
    runs-on: self-hosted
    environment: homolog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy
        run: bash scripts/deploy.sh homolog

  # ---------------------------------------------------------------------------
  # 2. Deploy Produção — aguarda aprovação manual no GitHub
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy → Produção
    runs-on: self-hosted
    needs: deploy-homolog
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy
        run: bash scripts/deploy.sh prod
