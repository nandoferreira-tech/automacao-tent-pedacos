name: CI/CD — Agente WhatsApp

on:
  push:
    branches:
      - main       # → deploy produção
      - develop    # → deploy homologação

jobs:
  # ---------------------------------------------------------------------------
  # Deploy Homologação (branch: develop)
  # ---------------------------------------------------------------------------
  deploy-homolog:
    name: Deploy → Homologação
    runs-on: self-hosted
    if: github.ref == 'refs/heads/develop'
    environment: homolog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy
        run: bash scripts/deploy.sh homolog

  # ---------------------------------------------------------------------------
  # Deploy Produção (branch: main)
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy → Produção
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy
        run: bash scripts/deploy.sh prod
